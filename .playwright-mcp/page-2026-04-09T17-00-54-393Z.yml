        - generic [ref=e122]:
          - heading "About this screening" [level=3] [ref=e123]
          - paragraph [ref=e124]: "This is an 8-plate pseudoisochromatic screening that tests for red-green and blue-yellow color vision deficiency. It uses two established clinical methodologies:"
          - paragraph [ref=e125]:
            - strong [ref=e126]: Ishihara-style plates
            - text: (5 plates) present numbers hidden in fields of colored dots. The foreground and background colors sit on opposite sides of the red-green or blue-yellow confusion axis, with matched luminance so hue is the only available cue. Individuals with color vision deficiency cannot distinguish the figure from the background.
          - paragraph [ref=e127]:
            - strong [ref=e128]: HRR-style plates
            - text: (2 plates) use geometric shapes instead of numbers, which avoids digit-recognition bias and allows testing participants who cannot read numerals. The Hardy-Rand-Rittler test is the standard clinical complement to Ishihara for identifying both the type and severity of deficiency.
          - paragraph [ref=e129]: "Plate 1 is a control: it uses luminance contrast rather than chromatic contrast, so it should be visible regardless of color vision type. If the control plate is missed, the result is flagged as inconclusive (likely a screen brightness or lighting issue)."
          - paragraph [ref=e130]:
            - strong [ref=e131]: "Limitations:"
            - text: This is a screen-based approximation. Clinical Ishihara and HRR tests use precisely calibrated printed pigments under standardized illumination (CIE Illuminant C). Display color rendering varies by device, panel type, brightness, and ambient lighting. This screening can indicate the likely presence and type of color vision deficiency, but it cannot replace a clinical evaluation.
          - paragraph [ref=e132]:
